<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header class="header">
        <button class="form-btn" id="btnAtras" >
            Atrás
        </button>
        <button class="form-btn" id="btnCerrar">
            Cerrar sesión
        </button>
    </header>

    <h1>Movimientos</h1>
    <div class="acomodo-lateral">
        <div class="acomodo-vertical">
            <p>Identificación: <span id="identificacionEmpleado"></span></p>
            <p>Nombre: <span id="nombreEmpleado"></span></p>
            <p>Saldo de vacaciones: <span id="saldoEmpleado"></span></p>
        </div>

        <button onclick="window.location.href='insertarMovimiento.html'" class="form-btn-mov">Agregar movimiento</button>

    </div>
    
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Monto</th>
                <th>Nuevo saldo</th>
                <th>Usuario</th>
                <th>IP</th>
                <th>PostTime</th>
            </tr> 
        </thead>

        <tbody id="tabla-empleados">
        </tbody>
   </table>

    <script type="module" src="main.js"></script>
</body>
</html>
