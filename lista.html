<body class="body-lista">

   <div class="acomodo-lateral">

        </form>

        <button onclick="window.location.href='insertar.html'" class="form-btn">Agregar empleado</button>

    </div>
   <table id="empleados">
    <tr>
        <th>Puesto</th>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Contratación</th>
        <th>Acciones</th>
    </tr>  
   </table>

    <script src="main.js"></script>
