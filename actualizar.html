<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="body-insertar">
    <header class="header">
        <h1 class="logo">Actualizar empleado</h1>
        <button class="form-btn" id="btnCerrar">
            Cerrar sesión
        </button>
    </header>

    <form id="form-actualizar" class="form-insertar">
        <input type="text" placeholder="Documento de identidad" id="identidad" class="input">
        <input type="text" placeholder="Nombre completo" id="nombre" class="input">
        
        <select id="puesto">
            <option>Albañil</option>
            <option>Asistente</option>
            <option>Cajero</option>
            <option>Camarero</option>
            <option>Conductor</option>
            <option>Conserje</option>
            <option>Cuidador</option>
            <option>Fontanero</option>
            <option>Niñera</option>
            <option>Recepcionista</option>
        </select>
        <button type="submit" id="buscar" class="form-btn">Actualizar</button>
    </form>



    

    <script type="module" src="main.js"></script>
</body>
</html>
